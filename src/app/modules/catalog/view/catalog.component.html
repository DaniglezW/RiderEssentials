<div class="catalog-hero">
  <div class="hero-content">
    <h1>{{ 'CATALOG.HERO_TITLE' | translate }}</h1>
    <p>{{ 'CATALOG.HERO_SUBTITLE' | translate }}</p>
    <a routerLink="/garage" class="hero-cta">
      <i class="pi pi-flag"></i> {{ 'CATALOG.HERO_CTA' | translate }}
    </a>
  </div>
</div>

<div class="catalog-container">
  <app-filter-body
    [categories]="categories"
    (getNextPage)="getProductsByCategory($event)"
    (searchWithFilter)="getProductsByFilter($event)"
    class="filter-body"
  ></app-filter-body>

  <div class="catalog-main body-list">
    <div class="catalog-toolbar" *ngIf="!loading">
      <app-body-list-category
        *ngIf="categoryCatalog"
        [products]="productsByCategory"
        [sortBy]="sortBy"
      ></app-body-list-category>

      <app-body-list
        *ngIf="!categoryCatalog"
        [pageProducts]="products"
        [noPageable]="noPageable"
        [min]="min"
        [max]="max"
        [sortBy]="sortBy"
        (getNextPage)="getNextPage($event)"
      ></app-body-list>
    </div>

    <app-loading-spinner
      *ngIf="loading"
      [message]="showExtendedMessage ? ('CATALOG.LOADING_SLOW' | translate) : null"
    ></app-loading-spinner>
  </div>
</div>
