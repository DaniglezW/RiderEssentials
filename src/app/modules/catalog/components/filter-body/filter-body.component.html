<div class="filter-body">
  <div class="filter-section">
    <h3 class="filter-title">{{ 'FILTER.PRICE' | translate }}</h3>
    <div class="price-values">
      <span>{{ convertPrice(minPrice) }}</span>
      <span class="sep">—</span>
      <span>{{ convertPrice(maxPrice) }}</span>
    </div>
    <div class="rangeslider">
      <input
        class="min input-ranges"
        [class.is-front]="activeThumb === 'min'"
        type="range"
        min="1"
        max="5000"
        [(ngModel)]="minPrice"
        (pointerdown)="activeThumb = 'min'"
      />
      <input
        class="max input-ranges"
        [class.is-front]="activeThumb === 'max'"
        type="range"
        min="1"
        max="5000"
        [(ngModel)]="maxPrice"
        (pointerdown)="activeThumb = 'max'"
      />
    </div>
    <button type="button" class="filter-btn" (click)="searchWithPrice()">
      {{ 'FILTER.APPLY' | translate }}
    </button>
  </div>

  <div class="filter-section">
    <h3 class="filter-title">{{ 'FILTER.CATEGORY' | translate }}</h3>
    <div class="category-list">
      <button
        *ngFor="let category of allCategories"
        class="category-chip"
        [class.active]="selectedCategory?.categoryId === category.categoryId"
        (click)="selectCategory($event, category)"
      >
        <span *ngIf="category.categoryId === 0">{{ 'FILTER.ALL_CATEGORIES' | translate }}</span>
        <span *ngIf="category.categoryId !== 0">{{ 'body.category.' + category.name.trim() | translate }}</span>
      </button>
    </div>
  </div>

  <div class="filter-section filter-promo">
    <i class="pi pi-percentage"></i>
    <p>{{ 'FILTER.PROMO' | translate }}</p>
    <code>MOTO10</code>
  </div>
</div>
